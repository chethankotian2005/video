name: Build Android APK

on:
  push:
    branches: [ "main" ]
    paths:
      - 'video/android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        run: |
          cd video/android
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Copy APK to web root
        run: |
          mkdir -p video
          cp video/android/app/build/outputs/apk/debug/app-debug.apk video/server.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Server-APK
          path: video/server.apk

      - name: Commit APK to repo
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add video/server.apk
          git diff --quiet --cached || (git commit -m 'Auto-build APK [skip ci]' && git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} main)
